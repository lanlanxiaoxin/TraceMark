appId: com.tracemark.app
productName: TraceMack
directories:
  buildResources: resources
  # 使用 release/ 避免与历史 dist/win-unpacked 文件锁冲突
  output: release

files:
  - 'out/**/*'

asar: true
asarUnpack:
  - '**/*.node'

win:
  target:
    - nsis
  icon: resources/icon.png
  # 本地打包无需下载 winCodeSign；有正式证书时可删掉此项并配置 CSC_*
  signAndEditExecutable: false

nsis:
  include: build/installer.nsh
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  allowElevation: true
  license: build/installer-license.txt
  installerLanguages:
    - zh_CN
    - en_US
  language: '2052'
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: TraceMack
  uninstallDisplayName: TraceMack
  runAfterFinish: true

extraResources:
  - from: resources/
    to: resources/
  - from: prompts/
    to: prompts/
